name: curiosity
description: curiosity killed the cat, but its not dead yet

base-image: ghcr.io/bootcrew/arch-bootc
image-version: latest 

modules:
  - type: files
    files:
      - source: system
        destination: / 

  - type: script
    scripts:
      - preset-cachyos.sh

  - type: script
    secrets:
      - type: env
        name: NTFY_TOPIC
        mount:
          type: env
          name: NTFY_TOPIC
    snippets:
      - 'curl -s -d "CachyOS Preset installed!" -H "Title: Layer Complete" -H "Tags: hourglass" "ntfy.sh/$NTFY_TOPIC" || true'

  - type: pacman
    install:
      packages:
        - base-devel
        - git
        - curl
        - sudo
        - mold
        - yazi  
        - nvim 
        - unzip
        - libarchive
        - ripgrep 
        - fd 
        - fzf 
        - bat 
        - eza
        - scx-scheds 
        - scx-tools
        - composefs
        - podman

  - type: script
    secrets:
      - type: env
        name: NTFY_TOPIC
        mount:
          type: env
          name: NTFY_TOPIC
    snippets:
      - 'curl -s -d "Base pacman apps installed!" -H "Title: Layer Complete" -H "Tags: hourglass" "ntfy.sh/$NTFY_TOPIC" || true'
    scripts:
      - setup-yay-user.sh
      - setup-v3-gaslight.sh

  - type: script
    secrets:
      - type: env
        name: NTFY_TOPIC
        mount:
          type: env
          name: NTFY_TOPIC
    snippets:
      - 'curl -s -d "yay installed!" -H "Title: Layer Complete" -H "Tags: hourglass" "ntfy.sh/$NTFY_TOPIC" || true'

  - type: kargs
    kargs:
      - mitigations=off
      - nowatchdog
      - nvidia_drm.modeset=1
      - nvidia_drm.fbdev=1

  - type: script 
    scripts:
      - install-dotfiles-deps.sh 

  - type: script 
    scripts:
      - install-aur-compiles.sh
      - install-personal.sh 
      - install-openclaw.sh

  - type: script 
    secrets:
      - type: env
        name: NTFY_TOPIC
        mount:
          type: env
          name: NTFY_TOPIC
    snippets:
      - 'curl -s -d "AUR and personal packages installed!" -H "Title: Layer Complete" -H "Tags: hourglass" "ntfy.sh/$NTFY_TOPIC" || true'
    scripts:
      - cleanup-yay-user.sh

  - type: systemd 
    system: 
      enabled: 
        - bluetooth 
        - power-profiles-daemon 
        - greetd 
        - NetworkManager
        - fstrim 
        - smartd
        - bootc-fetch-apply-updates.timer
        - systemd-resolved
        - keyd
        - thermald 
        - switcheroo-control
        - scx_loader
        - nohang-desktop
        - bpftune
        - opt-overlay
        - libvirtd.socket
        - virtqemud.socket 
        - virtnetworkd.socket 
        - virtnodedevd.socket 
        - virtstoraged.socket
    user: 
      enabled: 
        - ydotool 
        - opentabletdriver 
        - mpd 
        - mpd-mpris


  - type: script
    secrets:
      - type: env
        name: NTFY_TOPIC
        mount:
          type: env
          name: NTFY_TOPIC
    snippets:
      - 'curl -s -d "Exporting layers..." -H "Title: Layer Complete" -H "Tags: hourglass" "ntfy.sh/$NTFY_TOPIC" || true'
