name: curiosity
description: Trying out an atomic os for the first time.

base-image: ghcr.io/blue-build/base-images/fedora-base-nvidia-open
image-version: latest 

modules:
  - type: dnf
    repos:
      copr:
        - lionheartp/Hyprland
        - deltacopy/darkly
        - errornointernet/quickshell
        - lihaohong/yazi
    install:
      packages:
        - yazi
        - neovim
        - atuin
        - gh
        - mpd
        - mpv
        - ffmpeg
        - cava
        - pavucontrol
        - wireplumber
        - libdbusmenu-gtk3-devel
        - playerctl
        - geoclue2
        - bsdtar
        - brightnessctl
        - ddcutil
        - bc
        - coreutils
        - cliphist
        - cmake
        - curl
        - wget2
        - ripgrep
        - jq
        - xdg-utils
        - rsync
        - yq
        - adw-gtk3-theme
        - darkly
        - eza
        - fish
        - fontconfig
        - kitty
        - material-icons-fonts
        - twitter-twemoji-fonts
        - hyprland
        - hyprland-guiutils
        - hyprland-qt-support
        - hyprsunset
        - wl-clipboard
        - bluedevil
        - gnome-keyring
        - plasma-nm
        - polkit-kde
        - dolphin
        - plasma-systemsettings
        - xdg-desktop-portal
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-kde
        - xdg-desktop-portal-hyprland
        - clang
        - uv
        - gtk4-devel
        - libadwaita-devel
        - libsoup3-devel
        - libportal-gtk4
        - gobject-introspection-devel
        - python3
        - python3.12
        - python3-devel
        - python3.12-devel
        - quickshell-git
        - matugen
        - hyprshot
        - slurp
        - swappy
        - tesseract
        - tesseract-langpack-eng
        - wf-recorder
        - upower
        - wtype
        - ydotool
        - fuzzel
        - glib2
        - ImageMagick
        - hypridle
        - hyprlock
        - hyprpicker
        - translate-shell
        - qalculate
        - wlogout
        - unzip
        - firefox
        - sddm
        - ffmpegthumbnailer
        - tldr
        - bat
        - fzf 
        - ripgrep
        - qt6-qtpositioning

  - type: script
    snippets:
      - |
        echo "Fetching latest rmpc release..."
        RMPC_URL=$(curl -s https://api.github.com/repos/mierak/rmpc/releases/latest | jq -r '.assets[] | select(.name | test("x86_64.*linux.*tar.gz$")) | .browser_download_url' | head -n 1)
        curl -sL "$RMPC_URL" | tar -xz -C /tmp
        find /tmp -type f -name "rmpc" -exec mv {} /usr/bin/rmpc \;
        chmod +x /usr/bin/rmpc
  
      - |
        echo "Fetching and installing the latest Vesktop RPM..."
        curl -sL https://vencord.dev/download/vesktop/amd64/rpm -o /tmp/vesktop.rpm
        dnf install -y /tmp/vesktop.rpm
  
      - |
        echo "Fetching latest OpenTabletDriver RPM from GitHub..."
        # 1. Query the API and use jq to find the URL of the file ending in x86_64.rpm
        OTD_URL=$(curl -s https://api.github.com/repos/OpenTabletDriver/OpenTabletDriver/releases/latest | jq -r '.assets[] | select(.name | test("x86_64\\.rpm$")) | .browser_download_url' | head -n 1)
        
        # 2. Download the file using the dynamic URL
        curl -sL "$OTD_URL" -o /tmp/opentabletdriver.rpm
        
        # 3. Install it natively
        dnf install -y --setopt=tsflags=noscripts /tmp/opentabletdriver.rpm
  

  - type: default-flatpaks
    configurations:
      - notify: false
      - scope: user
        install:
          - org.freedownloadmanager.Manager
          - com.github.johnfactotum.Foliate
          - io.github.celluloid_player.Celluloid
          - org.vinegarhq.Sober
          - com.spotify.Client
      - scope: system
