name: curiosity
description: Trying out an atomic os for the first time.

base-image: ghcr.io/blue-build/base-images/fedora-base-nvidia-open
image-version: latest 

modules:
  - type: dnf
    repos:
      copr:
        - ririko66z/dots-hyprland
        - lionheartp/Hyprland
        - deltacopy/darkly
        - errornointernet/quickshell
        - lihaohong/yazi
    install:
      packages:
        - yazi
        - neovim
        - atuin
        - gh
        - mpd
        - mpv
        - ffmpeg
        - cava
        - pavucontrol
        - wireplumber
        - libdbusmenu-gtk3-devel
        - playerctl
        - geoclue2
        - bsdtar
        - brightnessctl
        - ddcutil
        - bc
        - coreutils
        - cliphist
        - cmake
        - curl
        - wget2
        - ripgrep
        - jq
        - xdg-utils
        - rsync
        - yq
        - adw-gtk3-theme
        - darkly
        - eza
        - fish
        - fontconfig
        - kitty
        - material-icons-fonts
        - twitter-twemoji-fonts
        - hyprland
        - hyprland-guiutils
        - hyprland-qt-support
        - hyprsunset
        - wl-clipboard
        - bluedevil
        - gnome-keyring
        - plasma-nm
        - polkit-kde
        - dolphin
        - plasma-systemsettings
        - xdg-desktop-portal
        - xdg-desktop-portal-gtk
        - xdg-desktop-portal-kde
        - xdg-desktop-portal-hyprland
        - clang
        - uv
        - gtk4-devel
        - libadwaita-devel
        - libsoup3-devel
        - libportal-gtk4
        - gobject-introspection-devel
        - python3
        - python3.12
        - python3-devel
        - python3.12-devel
        - quickshell-git
        - matugen
        - hyprshot
        - slurp
        - swappy
        - tesseract
        - tesseract-langpack-eng
        - wf-recorder
        - upower
        - wtype
        - ydotool
        - fuzzel
        - glib2
        - ImageMagick
        - hypridle
        - hyprlock
        - hyprpicker
        - translate-shell
        - qalculate
        - wlogout
        - mpvpaper
        - unzip
        - firefox
        - sddm
        - ffmpegthumbnailer
        - tldr
        - bat
        - fzf 
        - ripgrep

  - type: script
      snippets:
        - |
          echo "Fetching latest rmpc release..."
          RMPC_URL=$(curl -s https://api.github.com/repos/mierak/rmpc/releases/latest | jq -r '.assets[] | select(.name | test("x86_64.*linux.*tar.gz$")) | .browser_download_url' | head -n 1)
          curl -sL "$RMPC_URL" | tar -xz -C /tmp
          find /tmp -type f -name "rmpc" -exec mv {} /usr/bin/rmpc \;
          chmod +x /usr/bin/rmpc

        - |
          echo "Stealing Spotify directly from Debian repos..."
          # Fetch the latest deb URL from Spotify's package manifest
          SPOTIFY_DEB_URL=$(curl -s "https://repository-origin.spotify.com/dists/testing/non-free/binary-amd64/Packages" | grep "^Filename: " | head -n 1 | awk '{print "https://repository-origin.spotify.com/"$2}')
          curl -sL "$SPOTIFY_DEB_URL" -o /tmp/spotify.deb
          
          # Extract the deb archive
          cd /tmp
          ar x spotify.deb
          
          # Extract the data payload directly into the root filesystem (/usr/share/spotify, /usr/bin/spotify)
          tar -xf data.tar.* -C /
          
          # Fix the desktop shortcut icon name just in case
          sed -i 's/Icon=spotify-client/Icon=spotify/' /usr/share/applications/spotify.desktop

        - |
          echo "Fetching and installing the latest Vesktop RPM..."
          curl -sL https://vencord.dev/download/vesktop/amd64/rpm -o /tmp/vesktop.rpm
          dnf install -y /tmp/vesktop.rpm

        - |
          echo "Fetching latest OpenTabletDriver RPM from GitHub..."
          # 1. Query the API and use jq to find the URL of the file ending in x86_64.rpm
          OTD_URL=$(curl -s https://api.github.com/repos/OpenTabletDriver/OpenTabletDriver/releases/latest | jq -r '.assets[] | select(.name | test("x86_64\\.rpm$")) | .browser_download_url' | head -n 1)
          
          # 2. Download the file using the dynamic URL
          curl -sL "$OTD_URL" -o /tmp/opentabletdriver.rpm
          
          # 3. Install it natively
          dnf install -y /tmp/opentabletdriver.rpm
  
        - |
          echo "Starting makepkg equivalent for nwg-look..."
          
          # 1. Install the build dependencies temporarily
          dnf install -y golang gtk3-devel cairo-devel glib2-devel
          
          # 2. Clone the repository and enter it
          git clone https://github.com/nwg-piotr/nwg-look.git /tmp/nwg-look
          cd /tmp/nwg-look
          
          # 3. Compile the application
          make build
          
          # 4. Install it (this automatically drops the binary in /usr/bin/ and the .desktop file in /usr/share/applications/)
          make install
          
          # 5. Clean up the source code and uninstall the compilers so they don't bloat the image!
          rm -rf /tmp/nwg-look
          dnf remove -y golang gtk3-devel cairo-devel glib2-devel
          dnf clean all

          

  - type: default-flatpaks
    configurations:
      - notify: false
      - scope: user
        install:
          - org.freedownloadmanager.Manager
          - com.github.johnfactotum.Foliate
          - io.github.celluloid_player.Celluloid
          - org.vinegarhq.Sober
      - scope: system
