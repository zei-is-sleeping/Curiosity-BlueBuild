name: curiosity
description: curiosity killed the cat, but its not dead yet

base-image: ghcr.io/bootcrew/arch-bootc
image-version: latest 

modules:
  # CachyOS related modifications like better repos and mirrorlists oh and kernel comes from here-
  #
  - type: files
    files:
      - source: system
        destination: / 

  - type: script
    scripts:
      - preset-cachyos.sh

  # Minimalist startup for something that ALWAYS builds
  - type: pacman
    install:
      packages:
        - base-devel
        - git
        - curl
        - sudo
        - mold
        - yazi  
        - nvim 
        - unzip
        - libarchive
        - ripgrep 
        - fd 
        - fzf 
        - bat 
        - eza
        - scx-scheds 
        - scx-tools

  # Setup Yay
  - type: script
    scripts:
      - setup-yay-user.sh
      - setup-v3-gaslight.sh

  - type: kargs
    kargs:
      - mitigations=off
      - nowatchdog
      - rcutree.enable_rcu_lazy=1
      - nvidia_drm.modeset=1
      - nvidia_drm.fbdev=1

  # Dotfiles installation
  - type: script 
    scripts:
      - install-dotfiles-deps.sh 

  # My own favourites, doesn't include all so some of them could be a part of dotfiles
  - type: script 
    scripts:
      - install-aur-compiles.sh
      - install-personal.sh 
      - install-openclaw.sh

  # All the root filesystem based configs go here
  # - type: script 
    # scripts:
      # - install-sddm-qylock.sh

  # cleanup the temporary builder user for yay
  - type: script 
    scripts: 
      - cleanup-yay-user.sh

  - type: systemd 
    system: 
      enabled: 
        - bluetooth 
        - power-profiles-daemon 
        - greetd 
        - NetworkManager
        - fstrim 
        - smartd
        - bootc-fetch-apply-updates.timer
        - systemd-resolved
        - keyd
        - thermald 
        - switcheroo-control
        - scx_loader
        - nohang-desktop
        - bpftune
        - opt-overlay
    user: 
      enabled: 
        - ydotool 
        - opentabletdriver 
        - mpd 
        - mpd-mpris
        - podman.socket


